name: Build Firmware

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install platformio

      - name: Build firmware
        run: pio run -e esp32dev
        working-directory: ESP32

      - name: Commit firmware.bin + version.txt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          cp ESP32/.pio/build/esp32dev/firmware.bin firmware.bin
          echo "${{ github.sha }}" > version.txt
          git add firmware.bin version.txt
          git diff --staged --quiet || git commit -m "ci: update firmware [skip ci]"
          git push
